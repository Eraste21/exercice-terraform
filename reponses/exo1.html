<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Routes HTTP</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .form {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        input,
        select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #333;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .delete-btn {
            background: red;
            padding: 5px 8px;
        }
    </style>
</head>

<body>

    <h1>Gestion des Routes HTTP</h1>

    <div class="form">
        <select id="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
        </select>

        <input type="text" id="path" placeholder="/ex: /users">

        <input type="text" id="behavior" placeholder="Comportement attendu">

        <button onclick="addRow()">Ajouter</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Méthode</th>
                <th>Chemin</th>
                <th>Comportement attendu</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        function addRow() {
            const method = document.getElementById("method").value;
            const path = document.getElementById("path").value;
            const behavior = document.getElementById("behavior").value;

            if (!path || !behavior) {
                alert("Remplis tous les champs !");
                return;
            }

            const table = document.getElementById("tableBody");
            const row = table.insertRow();

            row.insertCell(0).innerText = method;
            row.insertCell(1).innerText = path;
            row.insertCell(2).innerText = behavior;

            const actionCell = row.insertCell(3);
            const deleteBtn = document.createElement("button");

            deleteBtn.innerText = "Supprimer";
            deleteBtn.className = "delete-btn";
            deleteBtn.onclick = () => row.remove();

            actionCell.appendChild(deleteBtn);

            // reset champs
            document.getElementById("path").value = "";
            document.getElementById("behavior").value = "";
        }
    </script>

</body>

</html>
